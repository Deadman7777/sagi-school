name: Build SAGI SCHOOL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Angular
        working-directory: frontend
        run: ng build --configuration production

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux
        working-directory: electron
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sagi-school-linux
          path: |
            dist-app/*.deb
            dist-app/*.AppImage

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Angular
        working-directory: frontend
        run: ng build --configuration production

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Windows
        working-directory: electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sagi-school-windows
          path: dist-app/*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: sagi-school-linux
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: sagi-school-windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          body: |
            ## SAGI SCHOOL ${{ github.ref_name }}

            ### Telechargements

            | Plateforme | Fichier | Description |
            |-----------|---------|-------------|
            | Windows | SAGI SCHOOL Setup.exe | Installateur Windows |
            | Linux | sagi-school.deb | Package Debian/Ubuntu |
            | Linux | SAGI SCHOOL.AppImage | Portable Linux |

            ### Installation Windows
            1. Telecharger SAGI SCHOOL Setup.exe
            2. Double-cliquer et suivre l'assistant
            3. Installer PostgreSQL depuis postgresql.org
            4. Lancer SAGI SCHOOL depuis le bureau

            ### Installation Linux
sudo dpkg -i sagi-school_*.deb
env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
