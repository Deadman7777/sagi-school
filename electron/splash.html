<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:400px; height:300px;
    background:#111827;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Segoe UI', sans-serif;
    color:#e8f0fe;
  }
  .logo  { font-size:28px; font-weight:700; color:#00d4aa; letter-spacing:1px; }
  .sub   { font-size:12px; color:#64748b; margin-top:6px; text-transform:uppercase; letter-spacing:2px; }
  .dots  { display:flex; gap:8px; margin-top:32px; }
  .dot   { width:8px; height:8px; border-radius:50%; background:#2a3f5f; animation:pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay:0.2s; }
  .dot:nth-child(3) { animation-delay:0.4s; }
  .msg   { font-size:12px; color:#64748b; margin-top:16px; }
  @keyframes pulse {
    0%,100% { background:#2a3f5f; transform:scale(1); }
    50%      { background:#00d4aa; transform:scale(1.3); }
  }
</style>
</head>
<body>
  <div class="logo">HADY GESMAN</div>
  <div class="sub">Système de Gestion Scolaire</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="msg">Démarrage en cours...</div>
</body>
</html>
